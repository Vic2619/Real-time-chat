version: "3.8"

services:

  frontend:
    build: ./Client
    container_name: realtime-chat-client

    ports:
      - "5173:5173"

    depends_on:
      - backend

  backend:
    build: ./Server
    container_name: realtime-chat-server

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/chatapp
      JWT_SECRET: mysecretkey

    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: realtime-chat-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: